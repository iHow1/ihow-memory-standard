name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node --check conformance/runners/run-all.mjs
      - run: node --check conformance/runners/lib/fixture-runner.mjs
      - run: npm run test:conformance
